name: Release

# 發行流程（spec 9.7 / 9.8 / AC-13，沿用舊 Electron 專案的發佈模式）：
# push 到 main 即觸發，版號以當下 UTC 日期時間產生（YY.M.D-當日分鐘數，
# 例如 26.7.12-853），自動建立草稿 Release 並清除舊草稿；
# 建置五組必要 artifacts：
#   Windows x86_64 / ARM64（NSIS；WiX MSI 不支援時間後綴版號，故不出 MSI）、
#   macOS x86_64 / ARM64、Linux x86_64
# 並產生 updater 簽章與 latest.json。
# 檢查完草稿內容後手動 Publish，已安裝的應用程式即可透過
#   https://github.com/malagege/pomodoro-tauri/releases/latest/download/latest.json
# 收到更新。
#
# 需要的 repository secrets：
#   TAURI_SIGNING_PRIVATE_KEY          updater 簽章私鑰內容（本機 ~/.tauri/pomodoro-updater.key）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD 私鑰密碼（目前為空字串）
# macOS 程式碼簽章／notarize 需要 Apple Developer 憑證後再補：
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
#
# Linux ARM64 為後續擴充（spec 15.3），不阻塞第一版 release。

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  draft:
    name: 版號與草稿 Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release-notes: ${{ steps.notes.outputs.notes }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 以 UTC 日期時間產生版號（沿用舊專案格式）
        id: version
        run: |
          minutes=$((10#$(date -u +%H) * 60 + 10#$(date -u +%M)))
          version="$(date -u +'%y.%-m.%-d')-${minutes}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "本次版號: ${version}"

      - name: 產生 release notes（上次發佈以來的 commits）
        id: notes
        run: |
          last=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          {
            echo 'notes<<NOTES_EOF'
            git log --pretty=format:'- %s (%h)' "${last}"..HEAD
            echo
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: 刪除過期的草稿 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq '.[] | select(.draft) | .id' |
          while read -r id; do
            echo "刪除草稿 release id=${id}"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${id}"
          done

  publish:
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows 只出 NSIS：WiX MSI 的 ProductVersion 不接受 -NNN 時間後綴
          - name: windows-x86_64
            platform: windows-latest
            args: '--bundles nsis'
          - name: windows-arm64
            platform: windows-latest
            args: '--target aarch64-pc-windows-msvc --bundles nsis'
          - name: macos-x86_64
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - name: macos-arm64
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - name: linux-x86_64
            platform: ubuntu-22.04
            args: ''
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: 安裝 Linux 系統依賴
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libxss-dev patchelf

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc,x86_64-apple-darwin,aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.name }}

      - name: 安裝依賴
        run: npm ci

      - name: 注入日期時間版號（僅本次建置，不寫回 repo）
        run: node scripts/set-version.mjs "${{ needs.draft.outputs.version }}"

      - name: 建置並上傳到草稿 Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.draft.outputs.version }}
          releaseName: 'Pomodoro v${{ needs.draft.outputs.version }}'
          releaseBody: ${{ needs.draft.outputs.release-notes }}
          # 以草稿建立：五組 artifacts 齊全並通過 smoke test 後再手動發佈（AC-13）
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
